name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_IP }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd ~/technomore-app
          git pull
          docker stop $(docker ps -aq) || true
          docker rm $(docker ps -aq) || true
          docker build -t technomore-app .
          docker run -d -p 80:80 technomore-app
